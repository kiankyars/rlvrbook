<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Escher-like reward topology</title>
  <desc id="desc">A stylized recursive staircase and interlocking tiles to evoke RL state-action-reward flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f4f0"/>
      <stop offset="100%" stop-color="#ede9e0"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M90 410 L250 300 L410 410 L250 520 Z" stroke="#4f4b45" stroke-width="12" fill="#cfd8dc"/>
    <path d="M250 300 L250 520 L410 410 L410 190 Z" stroke="#4f4b45" stroke-width="12" fill="#b8c6ce"/>
    <path d="M410 410 L410 190 L570 300 L570 520 Z" stroke="#4f4b45" stroke-width="12" fill="#a8b8c4"/>
    <path d="M570 300 L730 410 L730 520 L570 410 Z" stroke="#4f4b45" stroke-width="12" fill="#97a6b4"/>

    <path d="M90 410 L250 300 L250 190 L90 300 Z" stroke="#6d6156" stroke-width="8" fill="#e0d7cc" opacity="0.85"/>
    <path d="M250 190 L410 300 L410 190 L250 80 Z" stroke="#6d6156" stroke-width="8" fill="#cfd7da" opacity="0.85"/>
    <path d="M410 300 L570 410 L570 300 L410 190 Z" stroke="#6d6156" stroke-width="8" fill="#c5d0d7" opacity="0.85"/>
    <path d="M570 410 L730 520 L730 410 L570 300 Z" stroke="#6d6156" stroke-width="8" fill="#bcc5cf" opacity="0.85"/>
  </g>

  <g fill="none" stroke="#273640" stroke-width="5" opacity="0.75">
    <path d="M140 360 C180 330, 220 360, 260 330 S340 300, 380 330"/>
    <path d="M300 250 C340 220, 380 250, 420 220 S500 190, 540 220"/>
    <path d="M460 340 C500 310, 540 340, 580 310 S660 280, 700 310"/>
  </g>

  <g fill="#ffffff" stroke="#273640" stroke-width="3">
    <polygon points="220,300 250,280 280,300 250,320" fill="#f9f9f6"/>
    <polygon points="380,190 410,170 440,190 410,210" fill="#f8f6f2"/>
    <polygon points="540,300 570,280 600,300 570,320" fill="#f6f4ef"/>
  </g>

  <g stroke="none" fill="#2a2a2a">
    <circle cx="250" cy="300" r="8"/>
    <circle cx="410" cy="410" r="8"/>
    <circle cx="570" cy="300" r="8"/>
    <circle cx="730" cy="410" r="8"/>
    <text x="250" y="430" text-anchor="middle" font-size="24" font-family="Georgia, serif">state</text>
    <text x="250" y="460" text-anchor="middle" font-size="16" font-family="Georgia, serif">s</text>
    <text x="410" y="160" text-anchor="middle" font-size="24" font-family="Georgia, serif">action</text>
    <text x="410" y="130" text-anchor="middle" font-size="16" font-family="Georgia, serif">a</text>
    <text x="570" y="430" text-anchor="middle" font-size="24" font-family="Georgia, serif">state</text>
    <text x="570" y="460" text-anchor="middle" font-size="16" font-family="Georgia, serif">s′</text>
    <text x="730" y="320" text-anchor="middle" font-size="24" font-family="Georgia, serif">reward</text>
    <text x="730" y="340" text-anchor="middle" font-size="16" font-family="Georgia, serif">r</text>
  </g>

  <g fill="none" stroke="#4a433c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M280 300 L360 300 M360 300 L430 300 M430 300 L510 300 M510 300 L590 300" stroke-dasharray="3 10"/>
    <path d="M250 320 C280 420, 380 440, 410 410"/>
    <path d="M570 320 C620 420, 670 450, 730 410"/>
  </g>

  <polygon points="730,330 746,350 730,370" fill="#273640"/>
</svg>
