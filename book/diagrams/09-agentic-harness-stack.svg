<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Agentic RLVR harness stack</title>
  <desc id="desc">A schematic showing how a task enters a stateful environment, moves through a tool loop, becomes a recorded trajectory, receives verifier signals, and feeds an RL update and evaluation loop.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .box-strong { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.8; rx: 8; }
      .box-warn { fill: #fef3c7; stroke: #b45309; stroke-width: 1.5; rx: 8; }
      .box-good { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .title { font-size: 20px; font-weight: 700; }
      .label { font-size: 15px; font-weight: 650; }
      .small { font-size: 12px; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.4; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="420"/>
  <text class="text title" x="490" y="38" text-anchor="middle">Agentic RLVR harness stack</text>

  <rect class="box" x="40" y="92" width="130" height="88" rx="8"/>
  <text class="text label" x="105" y="124" text-anchor="middle">Task input</text>
  <text class="text small" x="105" y="148" text-anchor="middle">issue, image,</text>
  <text class="text small" x="105" y="166" text-anchor="middle">query, goal</text>

  <rect class="box-strong" x="220" y="76" width="170" height="120" rx="8"/>
  <text class="text label" x="305" y="112" text-anchor="middle">Stateful</text>
  <text class="text label" x="305" y="132" text-anchor="middle">environment</text>
  <text class="text small" x="305" y="158" text-anchor="middle">repo, shell, browser,</text>
  <text class="text small" x="305" y="176" text-anchor="middle">image or database state</text>

  <rect class="box" x="455" y="76" width="170" height="120" rx="8"/>
  <text class="text label" x="540" y="112" text-anchor="middle">Agent tool loop</text>
  <text class="text small" x="540" y="140" text-anchor="middle">search, view, edit,</text>
  <text class="text small" x="540" y="158" text-anchor="middle">create, execute,</text>
  <text class="text small" x="540" y="176" text-anchor="middle">retrieve, answer</text>

  <rect class="box" x="700" y="76" width="220" height="120" rx="8"/>
  <text class="text label" x="810" y="112" text-anchor="middle">Recorded trajectory</text>
  <text class="text small" x="810" y="140" text-anchor="middle">messages, tool calls,</text>
  <text class="text small" x="810" y="158" text-anchor="middle">observations, patches,</text>
  <text class="text small" x="810" y="176" text-anchor="middle">timeouts, exit reason</text>

  <rect class="box-warn" x="455" y="258" width="190" height="112" rx="8"/>
  <text class="text label" x="550" y="292" text-anchor="middle">Verifier stack</text>
  <text class="text small" x="550" y="318" text-anchor="middle">tests, exact match,</text>
  <text class="text small" x="550" y="336" text-anchor="middle">format checks, rubrics,</text>
  <text class="text small" x="550" y="354" text-anchor="middle">rerankers</text>

  <rect class="box-good" x="725" y="258" width="170" height="112" rx="8"/>
  <text class="text label" x="810" y="292" text-anchor="middle">RL update</text>
  <text class="text small" x="810" y="318" text-anchor="middle">filter rollouts,</text>
  <text class="text small" x="810" y="336" text-anchor="middle">compute advantages,</text>
  <text class="text small" x="810" y="354" text-anchor="middle">update policy</text>

  <rect class="box" x="205" y="258" width="170" height="112" rx="8"/>
  <text class="text label" x="290" y="292" text-anchor="middle">Eval and scaling</text>
  <text class="text small" x="290" y="318" text-anchor="middle">pass@1, pass@k,</text>
  <text class="text small" x="290" y="336" text-anchor="middle">hidden tests,</text>
  <text class="text small" x="290" y="354" text-anchor="middle">production gates</text>

  <path class="arrow" d="M170 136 H220"/>
  <path class="arrow" d="M390 136 H455"/>
  <path class="arrow" d="M625 136 H700"/>
  <path class="arrow" d="M810 196 V226 H550 V258"/>
  <path class="arrow" d="M645 314 H725"/>
  <path class="dash" d="M455 314 H375"/>
  <path class="dash" d="M725 314 C610 408 385 408 290 370"/>
  <path class="dash" d="M290 258 C320 218 430 204 470 186"/>

  <text class="text small" x="180" y="228" text-anchor="middle">The reward is not just a function.</text>
  <text class="text small" x="180" y="246" text-anchor="middle">It is produced by the whole interface.</text>
</svg>
