project:
  type: book
  preview:
    navigate: false

book:
  title: "Reinforcement Learning from Verifiable Rewards"
  author: "Kian Kyars"
  output-file: rlvrbook
  favicon: escher/escher.jpg
  sidebar:
    title: "rlvrbook"
  downloads:
    - pdf
  chapters:
    - index.md
    - part: "Foundations"
      chapters:
        - chapters/01-introduction.md
    - part: "Verifier Design"
      chapters:
        - chapters/02-outcome-rewards.md
        - chapters/03-process-rewards.md
        - chapters/04-learned-programmatic-and-hybrid-verifiers.md
    - part: "From Verifiers to Capability"
      chapters:
        - chapters/05-turning-checks-into-training-signal.md
        - chapters/06-search-and-test-time-verification.md
    - part: "Optimization Pressure"
      chapters:
        - chapters/07-reward-hacking-and-verifier-robustness.md
    - part: "Domains and Frontiers"
      chapters:
        - chapters/08-a-frontier-recipe.md
        - chapters/09-long-context-multimodal-and-agentic-rlvr.md
        - chapters/10-open-problems-and-the-research-agenda.md
  appendices:
    - appendices/a-minimal-rl-and-post-training-background.md
    - appendices/b-practical-verifier-design-checklist.md
    - appendices/c-core-terminology.md

bibliography: bibliography.bib

crossref:
  chapters: true

execute:
  freeze: auto
  echo: false
  warning: false

format:
  html:
    theme:
      light: flatly
      dark: darkly
    appendix-style: plain
    appendix-cite-as: false
    code-copy: hover
    respect-user-color-scheme: true
    toc: true
    toc-depth: 3
    number-sections: true
    css: styles/custom.css
  pdf:
    toc: true
    toc-depth: 2
    number-sections: true
    colorlinks: true
    top-level-division: section
    documentclass: scrartcl
    classoption:
      - numbers=noendperiod
    geometry:
      - top=0.85in
      - bottom=0.9in
      - left=0.95in
      - right=0.95in
    include-in-header:
      text: |
        \let\cleardoublepage\clearpage
        \makeatletter
        \def\cleardoubleoddpage{\clearpage}
        \def\cleardoubleevenpage{\clearpage}
        \def\cleardoubleemptypage{\clearpage}
        \renewcommand\part[1]{%
          \clearpage
          \refstepcounter{part}%
          \phantomsection
          \addcontentsline{toc}{part}{\thepart\quad #1}%
          {\Large\bfseries Part \thepart\par}
          {\LARGE\bfseries #1\par}
          \vspace{1em}
        }
        \makeatother
