project:
  type: book

book:
  title: "Reinforcement Learning from Verifiable Rewards"
  author: "Kian Kyars"
  output-file: rlvrbook
  favicon: escher.jpg
  sidebar:
    title: "rlvrbook"
  downloads:
    - pdf
  chapters:
    - index.md
    - part: "Foundations"
      chapters:
        - chapters/01-introduction.md
    - part: "Verifier Design"
      chapters:
        - chapters/02-outcome-rewards.md
        - chapters/03-process-rewards.md
        - chapters/04-learned-programmatic-and-hybrid-verifiers.md
    - part: "From Verifiers to Capability"
      chapters:
        - chapters/05-turning-checks-into-training-signal.md
        - chapters/06-search-and-test-time-verification.md
    - part: "Optimization Pressure"
      chapters:
        - chapters/07-reward-hacking-and-verifier-robustness.md
        - chapters/08-when-verifiable-rewards-become-capability.md
    - part: "Domains and Frontiers"
      chapters:
        - chapters/09-long-context-multimodal-and-agentic-rlvr.md
        - chapters/10-open-problems-and-the-research-agenda.md
  appendices:
    - appendices/a-minimal-rl-and-post-training-background.md
    - appendices/b-benchmarks-evals-and-contamination.md
    - appendices/c-practical-verifier-design-checklist.md
    - appendices/d-core-terminology.md

bibliography: bibliography.bib

crossref:
  chapters: true

execute:
  freeze: auto
  echo: false
  warning: false

format:
  html:
    theme:
      light: flatly
      dark: darkly
    appendix-style: plain
    appendix-cite-as: false
    code-copy: hover
    respect-user-color-scheme: true
    toc: true
    toc-depth: 3
    number-sections: true
    css: styles/custom.css
  pdf:
    toc: true
    number-sections: true
    colorlinks: true
