name: Update Contributors

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  update-contributor:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.type == 'User'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Update contributor list
        env:
          CONTRIBUTOR_LOGIN: ${{ github.event.pull_request.user.login }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_contributors.py

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- book/index.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit contributor update
        if: steps.changes.outputs.changed == 'true'
        env:
          CONTRIBUTOR_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          git add book/index.md
          git commit -m "Add contributor @$CONTRIBUTOR_LOGIN"

      - name: Push contributor update
        if: steps.changes.outputs.changed == 'true'
        run: git push

      - name: Trigger publish workflow
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl --fail-with-body --request POST \
            --url "https://api.github.com/repos/$REPOSITORY/actions/workflows/publish.yml/dispatches" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data '{"ref":"main"}'
